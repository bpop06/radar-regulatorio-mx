name: Collect regulatory data (manual fallback)

# GitHub Pages se publica con "Deploy from a branch" (main, carpeta /docs),
# por lo que este workflow ya no despliega: sólo recolecta datos y los
# committea. Se mantiene como respaldo manual mientras GitHub Actions de la
# cuenta siga fallando con startup_failure; la vía diaria es la Mac
# (docs/MAC_SCHEDULE.md).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.txt
      - run: python -m pip install . --no-deps
      - name: Collect official publications
        env:
          LOCAL_TIMEZONE: America/Mexico_City
          REQUEST_TIMEOUT_SECONDS: "45"
          SOURCE_RETRIES: "3"
          SOURCE_RETRY_BACKOFF_SECONDS: "1.5"
        run: python -m app.cli collect --output docs/data/publications.json --days 31
      - name: Validate generated data
        run: python -m app.cli validate --input docs/data/publications.json
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- docs/data/publications.json; then
            echo "no publication data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/publications.json
          git commit -m "chore: refresh regulatory data"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
