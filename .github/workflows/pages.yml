name: Collect and deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .
      - name: Collect official publications
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.5
          LOCAL_TIMEZONE: America/Mexico_City
          REQUEST_TIMEOUT_SECONDS: "45"
          SOURCE_RETRIES: "3"
          SOURCE_RETRY_BACKOFF_SECONDS: "1.5"
        run: python -m app.cli collect --output site/data/publications.json --days 31
      - name: Validate generated data
        run: python -m app.cli validate --input site/data/publications.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
